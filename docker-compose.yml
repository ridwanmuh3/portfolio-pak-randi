services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-strapi}
      POSTGRES_USER: ${POSTGRES_USER:-strapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    command:
      - "postgres"
      - "-c"
      - "password_encryption=scram-sha-256"
      - "-c"
      - "ssl=off"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=32MB"
      - "-c"
      - "effective_cache_size=256MB"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-strapi} -d ${POSTGRES_DB:-strapi}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    # No `ports:` — DB not exposed to host
    security_opt:
      - no-new-privileges:true
    mem_limit: 384m
    memswap_limit: 384m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 1337
      NODE_ENV: production
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DATABASE_CLIENT: ${DATABASE_CLIENT:-postgres}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-strapi}
      DATABASE_USERNAME: ${POSTGRES_USER:-strapi}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_SCHEMA: public
      DATABASE_SSL: "false"
      DATABASE_POOL_MIN: 1
      DATABASE_POOL_MAX: 5
      NODE_OPTIONS: "--max-old-space-size=384"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      URL: ${STRAPI_PUBLIC_URL:-http://localhost/}
      PROXY: "true"
    volumes:
      - strapi_uploads:/opt/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "1337"
    networks:
      - web
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1337/_health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    mem_limit: 512m
    memswap_limit: 512m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_ vars are baked into the JS bundle at build time.
        # Set NEXT_PUBLIC_STRAPI_URL to your public domain so the browser
        # resolves media URLs correctly (nginx proxies /uploads/ from Strapi).
        NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:?NEXT_PUBLIC_STRAPI_URL required}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      STRAPI_URL: http://backend:1337
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN}
      NODE_OPTIONS: "--max-old-space-size=384"
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    memswap_limit: 512m

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    mem_limit: 64m
    memswap_limit: 64m
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - web

volumes:
  pg_data:
  strapi_uploads:

networks:
  web:
    driver: bridge
  internal:
    driver: bridge
    internal: true
