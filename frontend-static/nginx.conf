worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset utf-8;
    server_tokens off;
    types_hash_max_size 2048;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 20s;
    keepalive_requests 1000;
    send_timeout 10s;
    sendfile on;
    tcp_nopush on;
    etag on;
    autoindex off;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    server {
        listen 3000;
        listen [::]:3000;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

        location = /api/health {
            access_log off;
            add_header Content-Type text/plain always;
            add_header Cache-Control "no-store" always;
            return 200 "ok\n";
        }

        location ~ ^/projects/smartqr(?<child>/.*)?$ {
            return 308 https://smart-secure-qrcode.netlify.app$child$is_args$args;
        }

        location ~ /\.(?!well-known) {
            return 404;
        }

        location ~* \.(?:bak|conf|dist|fla|ini|log|orig|psd|sh|sql|swp|yml)$ {
            return 404;
        }

        location ^~ /assets/ {
            try_files $uri =404;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable" always;
        }

        location ~* \.(?:js|ico|svg|png|jpg|jpeg|webp|pdf)$ {
            try_files $uri =404;
            expires 1d;
            add_header Cache-Control "public, max-age=86400" always;
        }

        location / {
            limit_except GET HEAD { deny all; }
            try_files $uri $uri.html $uri/ /index.html;
        }
    }
}
