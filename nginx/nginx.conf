user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # ----- Core hardening -----
    server_tokens off;
    more_set_headers "Server: nginx" 2>/dev/null || true;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30s;
    keepalive_requests 200;
    send_timeout 30s;
    reset_timedout_connection on;

    # ----- Request size limits (anti-DoS / buffer overflow) -----
    client_max_body_size 25m;
    client_body_buffer_size 16k;
    client_header_buffer_size 2k;
    large_client_header_buffers 4 8k;
    client_body_timeout 15s;
    client_header_timeout 15s;

    # ----- Compression -----
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/xml+rss application/atom+xml image/svg+xml font/woff font/woff2;

    # ----- Proxy defaults -----
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    # Strip client-supplied hop-by-hop that could poison downstream
    proxy_set_header X-Forwarded-Server "";
    proxy_set_header X-Original-URL "";
    proxy_set_header X-Rewrite-URL "";
    proxy_hide_header X-Powered-By;
    proxy_hide_header X-AspNet-Version;
    proxy_hide_header X-AspNetMvc-Version;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_buffer_size 8k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    proxy_cache_path /var/cache/nginx/next levels=1:2 keys_zone=next_cache:50m
                     max_size=1g inactive=60m use_temp_path=off;

    # ----- Rate limiting -----
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    map $sent_http_content_type $expires {
        default                    off;
        text/css                   7d;
        application/javascript     7d;
        ~image/                    30d;
        ~font/                     30d;
    }

    # ----- Injection-pattern detection (lightweight WAF) -----
    # 1 = suspicious, block with 403. Scans query string + URI.
    map $request_uri $bad_uri {
        default                                   0;
        "~*(?:\.\.(?:/|\\))"                      1;   # path traversal
        "~*(?:/etc/passwd|/proc/self)"            1;   # LFI
        "~*(?:<script\b|javascript:|vbscript:)"   1;   # XSS
        "~*(?:\bunion\b.+\bselect\b)"             1;   # SQLi
        "~*(?:\bselect\b.+\bfrom\b.+\binformation_schema\b)" 1;
        "~*(?:';.*(?:--|#|/\*))"                  1;   # SQL comment chain
        "~*(?:\bexec\s*\()"                       1;
        "~*(?:\bbenchmark\s*\()"                  1;
        "~*(?:\bsleep\s*\()"                      1;
        "~*(?:/wp-(?:admin|login|content))"       1;   # noise scanners
        "~*(?:\.(?:git|env|aws|ssh|htaccess|htpasswd))(?:/|$)" 1;
        "~*(?:%00|\x00)"                          1;   # null byte
    }

    map $http_user_agent $bad_ua {
        default                                   0;
        ""                                        1;
        "~*(?:sqlmap|nikto|nessus|acunetix|nmap|masscan|fimap|whatweb|wpscan|dirbuster|gobuster|feroxbuster)" 1;
    }

    map $request_method $bad_method {
        default 1;
        GET     0;
        HEAD    0;
        POST    0;
        PUT     0;
        PATCH   0;
        DELETE  0;
        OPTIONS 0;
    }

    upstream frontend_upstream {
        server frontend:3000;
        keepalive 32;
    }

    upstream backend_upstream {
        server backend:1337;
        keepalive 32;
    }

    upstream smartqr_upstream {
        server smartqr:3000;
        keepalive 32;
    }

    # ----- HTTP server (redirect to HTTPS if TLS term upstream, else serve) -----
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Connection cap
        limit_conn conn_limit 50;
        limit_req zone=global_limit burst=120 nodelay;

        # Global request filters
        if ($bad_method)  { return 405; }
        if ($bad_uri)     { return 403; }
        if ($bad_ua)      { return 403; }

        # ----- Security headers (HSTS enabled once TLS terminates at edge) -----
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), fullscreen=(self)" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        # Strict CSP — adjust script-src hashes if inline scripts change
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; media-src 'self'; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests" always;
        # Enable once TLS is configured
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ----- Deny dotfiles / version control / backups -----
        location ~ /\.(?!well-known) { deny all; return 404; }
        location ~* \.(?:bak|old|orig|save|swp|swo|tmp|log|sql|sqlite|db)$ { deny all; return 404; }

        # ----- Health -----
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ----- Strapi REST (public, read-only) -----
        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;
            # Only safe methods reach public REST
            if ($request_method !~ ^(GET|HEAD|OPTIONS)$) { return 405; }
            proxy_pass http://backend_upstream;
        }

        # ----- Strapi uploads (static media, cached hard) -----
        location /uploads/ {
            proxy_pass http://backend_upstream;
            proxy_cache next_cache;
            proxy_cache_valid 200 30d;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            # Prevent execution of user-uploaded HTML/JS in browser
            add_header Content-Disposition "inline" always;
        }

        # ----- Strapi admin (restricted) -----
        # Lock down to internal IPs in prod via `allow`/`deny`.
        location /admin {
            limit_req zone=admin_limit burst=10 nodelay;
            # allow 10.0.0.0/8; allow 192.168.0.0/16; deny all;
            proxy_pass http://backend_upstream;
        }

        location ~ ^/(content-manager|content-type-builder|users-permissions|i18n|upload|email|documentation) {
            limit_req zone=admin_limit burst=10 nodelay;
            # allow 10.0.0.0/8; deny all;
            proxy_pass http://backend_upstream;
        }

        # Auth endpoints — tight throttle to blunt credential stuffing
        location ~ ^/(admin/login|auth/local|auth/forgot-password|auth/reset-password) {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://backend_upstream;
        }

        # ----- Next static assets -----
        location /_next/static/ {
            proxy_pass http://frontend_upstream;
            proxy_cache next_cache;
            proxy_cache_valid 200 365d;
            expires 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /_next/image {
            proxy_pass http://frontend_upstream;
            proxy_cache next_cache;
            proxy_cache_valid 200 60m;
            proxy_cache_key "$scheme$request_method$host$request_uri";
        }

        location /_next/data/ {
            proxy_pass http://frontend_upstream;
            proxy_cache next_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_use_stale error timeout updating;
        }

        location ~* \.(?:css|js|woff2?|ttf|eot|otf|svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
            proxy_pass http://frontend_upstream;
            proxy_cache next_cache;
            proxy_cache_valid 200 30d;
            expires $expires;
            add_header Cache-Control "public";
        }

        # ----- smartqr app (/projects/smartqr) -----
        location /projects/smartqr {
            limit_req zone=global_limit burst=120 nodelay;
            proxy_pass http://smartqr_upstream;
            proxy_cache next_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_bypass $http_upgrade $cookie_nocache $arg_nocache;
            proxy_no_cache $http_pragma $http_authorization;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ----- App (default) -----
        location / {
            proxy_pass http://frontend_upstream;
            proxy_cache next_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_bypass $http_upgrade $cookie_nocache $arg_nocache;
            proxy_no_cache $http_pragma $http_authorization;
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
}
