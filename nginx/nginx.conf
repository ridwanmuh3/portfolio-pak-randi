server {
    listen 80;
    server_name _;

    location = /project/smartqr {
        return 301 https://smart-secure-qrcode.netlify.app$is_args$args;
    }

    location = /project/smartqr/ {
        return 301 https://smart-secure-qrcode.netlify.app$is_args$args;
    }

    location / {
        proxy_pass http://frontend:3000;
    }

    # =========================
    # STRAPI API
    # =========================
    location /api/ {
        proxy_pass http://backend:1337;
    }

    location /uploads/ {
        proxy_pass http://backend:1337;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # =========================
    # SECURITY HEADERS
    # =========================
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    add_header Content-Security-Policy "
        default-src 'self';
        img-src 'self' data: blob: http://backend:1337;
        connect-src 'self' http://backend:1337;
        style-src 'self' 'unsafe-inline';
        script-src 'self';
    " always;

    # =========================
    # STATIC CACHE
    # =========================
    location = /api/health {
        return 200 "ok\n";
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
