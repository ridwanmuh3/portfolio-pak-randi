version: "3"

tasks:
  up:
    desc: Run all services (production mode)
    cmds:
      - docker compose up -d --build

  down:
    desc: Stop all services
    cmds:
      - docker compose down

  restart:
    desc: Restart all services
    cmds:
      - docker compose down
      - docker compose up -d --build

  logs:
    desc: Show logs (all services)
    cmds:
      - docker compose logs -f

  logs:backend:
    desc: Logs backend (Strapi)
    cmds:
      - docker compose logs -f backend

  logs:nginx:
    desc: Logs nginx
    cmds:
      - docker compose logs -f nginx

  logs:db:
    desc: Logs postgres
    cmds:
      - docker compose logs -f postgres

  build:
    desc: Build all images
    cmds:
      - docker compose build --no-cache

  rebuild:
    desc: Full rebuild (clean + build + up)
    cmds:
      - docker compose down -v
      - docker compose build --no-cache
      - docker compose up -d

  clean:
    desc: Remove containers, volumes, unused images
    cmds:
      - docker compose down -v
      - docker system prune -f

  shell:backend:
    desc: Access backend container
    cmds:
      - docker compose exec backend sh

  shell:nginx:
    desc: Access nginx container
    cmds:
      - docker compose exec nginx sh

  db:
    desc: Open postgres CLI
    cmds:
      - docker compose exec postgres psql -U ${POSTGRES_USER:-strapi}

  health:
    desc: Check service health
    cmds:
      - docker compose ps